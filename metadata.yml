id: user-rights
name: User Rights
tagline: Social media platforms where User Rights supports appeals
description: '[User Rights](https://www.user-rights.org/) is an [out-of-court dispute settlement body](https://digital-strategy.ec.europa.eu/en/policies/dsa-out-court-dispute-settlement) under the European Union’s Digital Services Act. It evaluates whether actions like content removal or decision to leave content on a platform after being notified of its potential illegality are justified. Their assessments are based on European law, considering freedom of expression and other fundamental rights, as well as on the platforms’ own terms.

This collection ensures that the rules used for litigation review are always up to date and that those in force at the time of complaint can be referenced without ambiguity.'
