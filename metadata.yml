i18n:
  fr:
    tagline: Médias sociaux pour lesquels un appel peut être déposé chez User Rights
    description: '[User Rights](https://www.user-rights.org/fr) est un [organisme de règlement extrajudiciaire des litiges](https://digital-strategy.ec.europa.eu/fr/policies/dsa-out-court-dispute-settlement) indépendant et gratuit, opérant au titre de la législation sur les services numériques de l’Union européenne. Il évalue si la décision d’une plateforme de retirer un contenu ou de le laisser en ligne après qu’elle ait été notifiée de son illégalité potentielle sont justifiés. Ses évaluations s’appuient sur le droit européen, en tenant compte de la liberté d’expression et d’autres droits fondamentaux, ainsi que sur les conditions d’utilisation propres à chaque plateforme.

Cette collection garantit que les règles utilisées pour l’examen des dossiers sont toujours à jour et que celles en vigueur au moment de la plainte peuvent être consultées, même a posteriori.'
